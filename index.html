<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aquapalay Database</title>
  <link rel="stylesheet" href="database.css">
</head>
<body>
  <h1>Aquapalay Sensor Database</h1>

  <div class="filter-container">
    <label for="pot-filter">Pot:</label>
    <select id="pot-filter">
      <option value="all">All</option>
      <option value="pot1">Pot1</option>
      <option value="pot2">Pot2</option>
      <option value="pot3">Pot3</option>
    </select>

    <label for="avg-filter" style="margin-left:16px;">Average By:</label>
    <select id="avg-filter">
      <option value="none">None (Raw Data)</option>
      <option value="hour">Hour</option>
      <option value="day">Day</option>
      <option value="week">Week</option>

    </select>
  </div>

  <!-- Column Group Filter -->
  <div class="filter-container" style="flex-wrap:wrap; gap:10px;">
    <label style="font-weight:bold;">Show Columns:</label>
    <label><input type="checkbox" class="col-group-toggle" data-group="n"    checked> N (Nitrogen)</label>
    <label><input type="checkbox" class="col-group-toggle" data-group="p"    checked> P (Phosphorus)</label>
    <label><input type="checkbox" class="col-group-toggle" data-group="k"    checked> K (Potassium)</label>
    <label><input type="checkbox" class="col-group-toggle" data-group="sm"   checked> Soil Moisture</label>
    <label style="font-weight:bold; margin-left:8px;">Pump Filter (5-min avg):</label>
    <label><input type="checkbox" id="pump-event-toggle" class="col-group-toggle" data-group="pump" checked> All Pumps</label>
    <label style="margin-left:8px;"><input type="checkbox" class="pump-individual" data-pump="Pump1" checked> Pump N</label>
    <label style="margin-left:8px;"><input type="checkbox" class="pump-individual" data-pump="Pump2" checked> Pump P</label>
    <label style="margin-left:8px;"><input type="checkbox" class="pump-individual" data-pump="Pump3" checked> Pump K</label>
    <label style="margin-left:8px;"><input type="checkbox" class="pump-individual" data-pump="Pump4" checked> Pump W</label>
  </div>

  <div class="filter-container">
    <label>Start Date:</label>
    <input type="datetime-local" id="start-date">
    <label>End Date:</label>
    <input type="datetime-local" id="end-date">
    <button class="btn-back" id="apply-filter">Apply Filter</button>
  </div>

  <div class="filter-container">
    <span id="loading-status" style="color: gray; font-style: italic;"></span>
  </div>

  <div class="filter-container">
    <button class="btn-back" id="prev-btn">Previous</button>
    <span id="page-info">Page 1</span>
    <button class="btn-back" id="next-btn">Next</button>
  </div>

  <table class="database-table" id="db-table">
    <thead>
      <tr>
        <th id="th-id">ID</th>
        <th id="th-timestamp">Timestamp</th>
        <th class="col-n1 group-n">N1</th>
        <th class="col-n2 group-n">N2</th>
        <th class="col-n3 group-n">N3</th>
        <th class="col-p1 group-p">P1</th>
        <th class="col-p2 group-p">P2</th>
        <th class="col-p3 group-p">P3</th>
        <th class="col-k1 group-k">K1</th>
        <th class="col-k2 group-k">K2</th>
        <th class="col-k3 group-k">K3</th>
        <th class="col-sm1 group-sm">Soil Moisture 1</th>
        <th class="col-sm2 group-sm">Soil Moisture 2</th>
        <th class="col-sm3 group-sm">Soil Moisture 3</th>
        <th class="col-pump group-pump">Pump N</th>
        <th class="col-pump group-pump">Pump P</th>
        <th class="col-pump group-pump">Pump K</th>
        <th class="col-pump group-pump">Pump W</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
  const filterSelect   = document.getElementById('pot-filter');
  const avgFilter      = document.getElementById('avg-filter');
  const tbody          = document.querySelector('#db-table tbody');
  const startDateInput = document.getElementById('start-date');
  const endDateInput   = document.getElementById('end-date');
  const applyBtn       = document.getElementById('apply-filter');
  const nextBtn        = document.getElementById('next-btn');
  const prevBtn        = document.getElementById('prev-btn');
  const pageInfo       = document.getElementById('page-info');
  const loadingStatus  = document.getElementById('loading-status');
  const thId           = document.getElementById('th-id');
  const thTimestamp    = document.getElementById('th-timestamp');
  const pumpEventToggle = document.getElementById('pump-event-toggle');

  let allData      = [];
  let filteredData = [];
  let currentPage  = 1;
  const limit      = 100;
  const PUMP_WINDOW = 300; // 5 minutes = 300 seconds of rows

  // Data base URL - use relative path for deployed site
  const DATA_BASE_URL = './NPKdataset';

  const numericCols = ['N1','N2','N3','P1','P2','P3','K1','K2','K3','SM1','SM2','SM3'];

  // ── Column Group Toggles ──────────────────────────────────────
  const groupVisible = { n: true, p: true, k: true, sm: true, pump: true };

  // Which individual pumps are active for filtering
  const pumpActive = { Pump1: true, Pump2: true, Pump3: true, Pump4: true };

  // "All Pumps" master checkbox — syncs individual pump checkboxes
  document.getElementById('pump-event-toggle').addEventListener('change', function() {
    groupVisible['pump'] = this.checked;
    document.querySelectorAll('.pump-individual').forEach(cb => {
      cb.checked = this.checked;
      pumpActive[cb.dataset.pump] = this.checked;
      cb.disabled = !this.checked;
    });
    currentPage = 1;
    applyFilters();
  });

  // Individual pump checkboxes
  document.querySelectorAll('.pump-individual').forEach(cb => {
    cb.addEventListener('change', () => {
      pumpActive[cb.dataset.pump] = cb.checked;
      // Sync master: checked if at least one individual is on
      const anyOn = Object.values(pumpActive).some(v => v);
      groupVisible['pump'] = anyOn;
      document.getElementById('pump-event-toggle').checked = anyOn;
      document.getElementById('pump-event-toggle').indeterminate =
        anyOn && !Object.values(pumpActive).every(v => v);
      currentPage = 1;
      applyFilters();
    });
  });

  document.querySelectorAll('.col-group-toggle').forEach(cb => {
    if (cb.id === 'pump-event-toggle') return; // handled above
    cb.addEventListener('change', () => {
      groupVisible[cb.dataset.group] = cb.checked;
      applyAllVisibility();
    });
  });

  // ── Event Listeners ───────────────────────────────────────────
  filterSelect.addEventListener('change', () => applyAllVisibility());
  avgFilter.addEventListener('change', () => { currentPage = 1; applyFilters(); });
  applyBtn.addEventListener('click',   () => { currentPage = 1; applyFilters(); });

  nextBtn.addEventListener('click', () => {
    if ((currentPage * limit) < filteredData.length) { currentPage++; renderTable(); }
  });
  prevBtn.addEventListener('click', () => {
    if (currentPage > 1) { currentPage--; renderTable(); }
  });

  // ── Combined Visibility ───────────────────────────────────────
  function applyAllVisibility() {
    const potFilter = filterSelect.value;
    const potShow   = potFilter === 'pot1' ? [0] : potFilter === 'pot2' ? [1] : potFilter === 'pot3' ? [2] : [0,1,2];

    const potGroups = {
      n:  ['col-n1','col-n2','col-n3'],
      p:  ['col-p1','col-p2','col-p3'],
      k:  ['col-k1','col-k2','col-k3'],
      sm: ['col-sm1','col-sm2','col-sm3']
    };

    ['n','p','k','sm'].forEach(grp => {
      potGroups[grp].forEach((cls, i) => {
        const visible = groupVisible[grp] && potShow.includes(i);
        toggleCol(cls, visible);
      });
    });

    toggleCol('col-pump', groupVisible['pump']);
  }

  function toggleCol(cls, visible) {
    document.querySelectorAll('.' + cls).forEach(el => el.style.display = visible ? '' : 'none');
  }

  // ── CSV Parsing ───────────────────────────────────────────────
  function parseCSV(text) {
    const rows    = text.trim().split("\n");
    const headers = rows.shift().split(",").map(h => h.trim());
    return rows
      .filter(line => line.trim() !== '')
      .map(line => {
        const values = line.split(",");
        let obj = {};
        headers.forEach((h, i) => obj[h] = values[i] ? values[i].trim() : "");
        return obj;
      });
  }

  // ── Load All CSVs ─────────────────────────────────────────────
  async function loadAllCSVs() {
    loadingStatus.textContent = 'Loading data...';
    let fileList = [];

    try {
      const manifestRes = await fetch(`${DATA_BASE_URL}/manifest.json`);
      fileList = await manifestRes.json();
    } catch (e) {
      loadingStatus.textContent = '⚠️ Could not load manifest.json.';
      tbody.innerHTML = `<tr><td colspan="18">Could not load manifest.json. Make sure it exists in NPKdataset/.</td></tr>`;
      return;
    }

    const fetchPromises = fileList.map(filename =>
      fetch(`${DATA_BASE_URL}/${filename}`)
        .then(r => r.ok ? r.text() : Promise.reject(`Failed: ${filename}`))
        .then(text => parseCSV(text))
        .catch(err => { console.warn(err); return []; })
    );

    const results = await Promise.all(fetchPromises);
    allData = results.flat();
    allData.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp)); // ascending for pump window logic

    filteredData = [...allData];
    loadingStatus.textContent = `✅ Loaded ${allData.length.toLocaleString()} records from ${fileList.length} file(s).`;
    renderTable();
  }

  // ── Group Key Helpers ─────────────────────────────────────────
  function getGroupKey(timestamp, mode) {
    const d = new Date(timestamp);
    if (mode === 'hour') {
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:00`;
    } else if (mode === 'day') {
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    } else if (mode === 'week') {
      const day = d.getDay() || 7;
      const mon = new Date(d);
      mon.setDate(d.getDate() - day + 1);
      return `Week of ${mon.getFullYear()}-${pad(mon.getMonth()+1)}-${pad(mon.getDate())}`;
    }
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  // ── Averaging ─────────────────────────────────────────────────
  function computeAverages(data, mode) {
    const groups = {};
    data.forEach(row => {
      if (!row.timestamp) return;
      const key = getGroupKey(row.timestamp, mode);
      if (!groups[key]) groups[key] = { key, rows: [] };
      groups[key].rows.push(row);
    });

    return Object.values(groups)
      .sort((a, b) => b.key.localeCompare(a.key))
      .map(group => {
        const avg = { timestamp: group.key, id: `${group.rows.length} records` };
        numericCols.forEach(col => {
          const vals = group.rows.map(r => parseFloat(r[col])).filter(v => !isNaN(v));
          avg[col] = vals.length ? (vals.reduce((s, v) => s + v, 0) / vals.length).toFixed(0) : '-';
        });
        ['Pump1','Pump2','Pump3','Pump4'].forEach(p => {
          const vals = group.rows.map(r => r[p]).filter(Boolean);
          avg[p] = vals.length ? mode_val(vals) : '-';
        });
        return avg;
      });
  }

  function mode_val(arr) {
    const freq = {};
    arr.forEach(v => freq[v] = (freq[v] || 0) + 1);
    return Object.entries(freq).sort((a, b) => b[1] - a[1])[0][0];
  }

  // ── Pump Event 5-min Average ──────────────────────────────────
  function computePumpEvents(data) {
    const pumpCols   = ['Pump1', 'Pump2', 'Pump3', 'Pump4'];
    const pumpLabels = { Pump1: 'N', Pump2: 'P', Pump3: 'K', Pump4: 'W' };
    const events     = [];

    // Only consider pumps that are individually checked
    const enabledPumps = pumpCols.filter(p => pumpActive[p]);

    for (let i = 0; i < data.length; i++) {
      const row = data[i];

      // Check if any ENABLED pump is ON
      const activePumps = enabledPumps.filter(p => String(row[p]).trim() === '1');
      if (activePumps.length === 0) continue;

      // Grab the next PUMP_WINDOW rows (or until end of data)
      const windowEnd  = Math.min(i + PUMP_WINDOW, data.length);
      const windowRows = data.slice(i, windowEnd);

      // Compute averages for each numeric column
      const avgRow = {};
      numericCols.forEach(col => {
        const vals = windowRows.map(r => parseFloat(r[col])).filter(v => !isNaN(v));
        avgRow[col] = vals.length ? (vals.reduce((s, v) => s + v, 0) / vals.length).toFixed(2) : '-';
      });

      // Label which pumps were active
      const pumpLabel = activePumps.map(p => `Pump${pumpLabels[p]}`).join(', ');

      events.push({
        id:          `${windowRows.length} rows`,
        timestamp:   row.timestamp,
        activePumps: pumpLabel,
        ...avgRow,
        Pump1: activePumps.includes('Pump1') ? '1' : '0',
        Pump2: activePumps.includes('Pump2') ? '1' : '0',
        Pump3: activePumps.includes('Pump3') ? '1' : '0',
        Pump4: activePumps.includes('Pump4') ? '1' : '0',
      });
    }

    return events.reverse();
  }

  // ── Filters ───────────────────────────────────────────────────
  function applyFilters() {
    const start    = startDateInput.value ? new Date(startDateInput.value) : null;
    const end      = endDateInput.value   ? new Date(endDateInput.value)   : null;
    const avgMode  = avgFilter.value;
    const pumpMode = groupVisible['pump']; // true = pump checkbox is checked

    let data = allData.filter(row => {
      if (!row.timestamp) return false;
      const rowDate = new Date(row.timestamp);
      if (start && rowDate < start) return false;
      if (end   && rowDate > end)   return false;
      return true;
    });

    if (pumpMode) {
      // Step 1: Compute pump events (5-min avg windows for each pump=1 trigger)
      let pumpEvents = computePumpEvents(data);

      // Step 2: If a grouping mode is selected, group the pump events by hour/day/week
      if (avgMode !== 'none') {
        filteredData = computeAverages(pumpEvents, avgMode);
        thId.textContent        = 'Events';
        thTimestamp.textContent = `Pump Trigger (by ${avgMode})`;
      } else {
        filteredData = pumpEvents; // already descending
        thId.textContent        = 'Window';
        thTimestamp.textContent = 'Pump Trigger Time';
      }
    } else {
      // Normal mode — no pump filtering
      if (avgMode !== 'none') {
        filteredData = computeAverages(data.slice().reverse(), avgMode);
        thId.textContent        = 'Records';
        thTimestamp.textContent = 'Timestamp';
      } else {
        filteredData = data.slice().reverse();
        thId.textContent        = 'ID';
        thTimestamp.textContent = 'Timestamp';
      }
    }

    currentPage = 1;
    renderTable();
  }

  // ── Render ────────────────────────────────────────────────────
  function renderTable() {
    tbody.innerHTML = "";

    const avgMode    = avgFilter.value;
    const startIndex = (currentPage - 1) * limit;
    const pageData   = filteredData.slice(startIndex, startIndex + limit);

    if (pageData.length === 0) {
      tbody.innerHTML = `<tr><td colspan="18">No data found</td></tr>`;
      pageInfo.textContent = 'Page 0';
      return;
    }

    const totalPages = Math.ceil(filteredData.length / limit);

    pageData.forEach(row => {
      const tr = document.createElement('tr');
      const pumpMode = groupVisible['pump'];
      const avgMode  = avgFilter.value;

      if (pumpMode) {
        tr.style.background = 'rgba(0,100,200,0.07)';
      } else if (avgMode !== 'none') {
        tr.style.background = 'rgba(0,128,0,0.05)';
      }

      // Show active pump badge when in pump event mode (raw, not grouped)
      const idCell = (pumpMode && avgMode === 'none')
        ? `${row.id}<br><small style="color:#0077cc;font-weight:bold;">${row.activePumps || ''}</small>`
        : row.id;

      tr.innerHTML = `
        <td>${idCell}</td>
        <td>${row.timestamp}</td>
        <td class="col-n1 group-n">${row.N1 ?? '-'}</td>
        <td class="col-n2 group-n">${row.N2 ?? '-'}</td>
        <td class="col-n3 group-n">${row.N3 ?? '-'}</td>
        <td class="col-p1 group-p">${row.P1 ?? '-'}</td>
        <td class="col-p2 group-p">${row.P2 ?? '-'}</td>
        <td class="col-p3 group-p">${row.P3 ?? '-'}</td>
        <td class="col-k1 group-k">${row.K1 ?? '-'}</td>
        <td class="col-k2 group-k">${row.K2 ?? '-'}</td>
        <td class="col-k3 group-k">${row.K3 ?? '-'}</td>
        <td class="col-sm1 group-sm">${row.SM1 ?? '-'}</td>
        <td class="col-sm2 group-sm">${row.SM2 ?? '-'}</td>
        <td class="col-sm3 group-sm">${row.SM3 ?? '-'}</td>
        <td class="col-pump group-pump" style="${row.Pump1==='1'?'color:green;font-weight:bold;':''}">${row.Pump1 ?? '-'}</td>
        <td class="col-pump group-pump" style="${row.Pump2==='1'?'color:green;font-weight:bold;':''}">${row.Pump2 ?? '-'}</td>
        <td class="col-pump group-pump" style="${row.Pump3==='1'?'color:green;font-weight:bold;':''}">${row.Pump3 ?? '-'}</td>
        <td class="col-pump group-pump" style="${row.Pump4==='1'?'color:green;font-weight:bold;':''}">${row.Pump4 ?? '-'}</td>
      `;
      tbody.appendChild(tr);
    });

    const pumpMode  = groupVisible['pump'];
    const modeLabel = pumpMode && avgMode === 'none' ? 'pump events'
                    : avgMode !== 'none' ? 'groups'
                    : 'records';
    pageInfo.textContent = `Page ${currentPage} of ${totalPages} (${filteredData.length.toLocaleString()} ${modeLabel})`;
    applyAllVisibility();
  }

  // ── Init ─────────────────────────────────────────────────────
  loadAllCSVs();
  </script>
</body>
</html>
